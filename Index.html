<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل طلبيات المبيعات - مع تصدير Excel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- XLSX Library for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- الأيقونات ---
        const Icon = ({ name, className = "w-4 h-4" }) => {
            const icons = {
                Plus: <path d="M12 5v14M5 12h14" />,
                Download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />,
                Trash2: <g><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><path d="M10 11v6M14 11v6"/></g>,
                FileText: <g><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8" /></g>,
                User: <g><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4" /></g>,
                Package: <g><path d="m7.5 4.27 9 5.15L21 8l-9-5.15L3 8l4.5-3.73ZM21 12l-9 5.15L3 12"/><path d="m3 16 9 5.15 9-5.15"/></g>,
                Calendar: <g><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10" /></g>,
                Tag: <g><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><line x1="7" x2="7.01" y1="7" y2="7" /></g>,
                Search: <g><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3" /></g>,
                Hash: <g><line x1="4" x2="20" y1="9" y2="9"/><line x1="4" x2="20" y1="15" y2="15"/><line x1="10" x2="8" y1="3" y2="21"/><line x1="16" x2="14" y1="3" y2="21" /></g>,
                ChevronDown: <path d="m6 9 6 6 6-6" />,
                CheckCircle: <g><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01" /></g>,
                ShoppingCart: <g><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" /></g>,
                Percent: <g><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5" /></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const SearchableSelect = ({ options, onSelect, placeholder, label, iconName, valueKey = "code", labelKey = "name", selectedValue = "", showLabel = true, className = "", allowCustom = false, onCustomChange = () => {} }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const wrapperRef = useRef(null);

            const currentItem = options.find(opt => opt[valueKey] === selectedValue);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                        setIsOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const filteredOptions = options.filter(option =>
                (String(option[labelKey]) || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                (String(option[valueKey]) || "").toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleSelect = (option) => {
                setSearchTerm("");
                setIsOpen(false);
                onSelect(option);
            };

            const handleInputChange = (e) => {
                const val = e.target.value;
                if (allowCustom) {
                    onCustomChange(val);
                }
                setSearchTerm(val);
                if (!isOpen) setIsOpen(true);
            };

            return (
                <div className={`relative ${className}`} ref={wrapperRef}>
                    {showLabel && label && (
                        <label className="flex items-center gap-2 text-slate-700 font-semibold text-sm mb-1.5">
                            {iconName && <Icon name={iconName} className="w-4 h-4 text-indigo-600" />} {label}
                        </label>
                    )}
                    <div className="relative">
                        <div className={`w-full rounded-lg border ${isOpen ? 'border-indigo-500 ring-2 ring-indigo-100 shadow-md' : 'border-slate-300'} bg-white flex items-center transition-all shadow-sm hover:border-indigo-400 overflow-hidden`}>
                            {allowCustom ? (
                                <input
                                    type="text"
                                    className="w-full p-2.5 text-xs bg-transparent outline-none text-slate-900 font-medium placeholder:text-slate-400"
                                    placeholder={placeholder}
                                    value={currentItem ? (showLabel ? currentItem[labelKey] : (className.includes('code-field') ? currentItem[valueKey] : currentItem[labelKey])) : searchTerm || selectedValue}
                                    onChange={handleInputChange}
                                    onFocus={() => setIsOpen(true)}
                                />
                            ) : (
                                <div className="w-full p-2.5 cursor-pointer flex justify-between items-center" onClick={() => setIsOpen(!isOpen)}>
                                    <span className={`truncate text-xs ${currentItem ? 'text-slate-900 font-medium' : 'text-slate-400'}`}>
                                        {currentItem ? (showLabel ? currentItem[labelKey] : (className.includes('code-field') ? currentItem[valueKey] : currentItem[labelKey])) : placeholder}
                                    </span>
                                </div>
                            )}
                            <Icon 
                                name="ChevronDown" 
                                className={`w-3.5 h-3.5 text-slate-400 mx-2.5 transition-transform cursor-pointer ${isOpen ? 'rotate-180' : ''}`} 
                                onClick={() => setIsOpen(!isOpen)}
                            />
                        </div>
                    </div>

                    {isOpen && (
                        <div className="absolute z-[100] w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-60 overflow-hidden">
                            {!allowCustom && (
                                <div className="p-2 border-b border-slate-100 bg-slate-50">
                                    <input
                                        autoFocus
                                        type="text"
                                        className="w-full p-2 text-xs border border-slate-200 rounded-lg outline-none focus:border-indigo-500 transition-all text-right"
                                        placeholder="ابحث هنا..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        onClick={(e) => e.stopPropagation()}
                                    />
                                </div>
                            )}
                            <div className="overflow-y-auto max-h-44 custom-scrollbar">
                                {filteredOptions.length > 0 ? (
                                    filteredOptions.map((option, index) => (
                                        <div
                                            key={index}
                                            className="p-3 hover:bg-indigo-50 cursor-pointer text-xs border-b border-slate-50 last:border-0 text-right"
                                            onClick={() => handleSelect(option)}
                                        >
                                            <div className="text-slate-800">{option[labelKey]}</div>
                                            <div className="text-[10px] text-slate-500 font-mono">{option[valueKey]}</div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="p-4 text-center text-xs text-slate-400 italic">لا توجد نتائج مطابقة</div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const sectors = [
                "قطاع القاهرة", "قطاع الاسكندرية", "قطاع الدلتا", 
                "قطاع شمال الصعيد", "قطاع جنوب الصعيد", "قطاع OR", "قطاع IR"
            ];

            const salesReps = [
                { id: '18521', name: 'احمد محمود زكريا' },
                { id: '19002', name: 'محمد علي حسن' },
                { id: '22015', name: 'سارة إبراهيم خالد' },
            ];

            const customers = [
                { code: 'CUST-100', name: 'كريم سنتر - فرع الهرم', sector: 'قطاع القاهرة' },
                { code: 'CUST-200', name: 'الشركة العربية للتجارة', sector: 'قطاع الجيزة' },
                { code: 'CUST-300', name: 'معرض الأجهزة الحديثة', sector: 'قطاع الإسكندرية' },
            ];

            const products = [
                { code: '1MARDWBIHIC3C26CP008', name: 'غسالة اطباق اريستون HIC3C26CW' },
                { code: '1MARDWFSDN436X0T098', name: 'غسالة اطباق اريستون 60 سم 13 فرد' },
                { code: 'REF-SAM-INV-500', name: 'ثلاجة سامسونج انفرتر 500 لتر' },
                { code: 'AC-LG-1.5HP-INV', name: 'تكييف ال جي 1.5 حصان انفرتر' },
                { code: 'TV-SAM-55-4K', name: 'شاشة سامسونج 55 بوصة 4K' },
            ];

            const [orderHeader, setOrderHeader] = useState({
                date: new Date().toISOString().split('T')[0],
                salesRep: null,
                salesRepNameRaw: '',
                salesRepIdRaw: '',
                customer: null,
                sector: '',
                poNumber: '',
                deliveryDate: '',
            });

            const [orderItems, setOrderItems] = useState([
                { id: window.crypto.randomUUID(), itemCode: '', itemName: '', qty: 1, discount: 0 }
            ]);

            const [globalDiscount, setGlobalDiscount] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [showSuccess, setShowSuccess] = useState(false);

            // تطبيق الخصم العام على جميع الأسطر الحالية
            const applyGlobalDiscount = (value) => {
                setGlobalDiscount(value);
                if (value !== '') {
                    const discountVal = parseFloat(value) || 0;
                    setOrderItems(orderItems.map(item => ({ ...item, discount: discountVal })));
                }
            };

            const addItemRow = () => {
                const currentDiscount = globalDiscount !== '' ? parseFloat(globalDiscount) : 0;
                setOrderItems([...orderItems, { id: window.crypto.randomUUID(), itemCode: '', itemName: '', qty: 1, discount: currentDiscount }]);
            };

            const removeItemRow = (id) => {
                if (orderItems.length > 1) {
                    setOrderItems(orderItems.filter(item => item.id !== id));
                }
            };

            const handleItemUpdate = (id, field, value) => {
                setOrderItems(orderItems.map(item => item.id === id ? { ...item, [field]: value } : item));
            };

            const handleProductSelect = (id, prod) => {
                setOrderItems(orderItems.map(item => 
                    item.id === id ? { ...item, itemCode: prod.code, itemName: prod.name } : item
                ));
            };

            const handleCustomerSelect = (cust) => {
                setOrderHeader(prev => ({ 
                    ...prev, 
                    customer: cust, 
                    sector: cust.sector || prev.sector 
                }));
            };

            const exportToExcel = () => {
                const data = orderItems.map((item, index) => ({
                    "م": index + 1,
                    "تاريخ الطلب": orderHeader.date,
                    "رقم الطلبية (PO)": orderHeader.poNumber,
                    "البائع": orderHeader.salesRep?.name || orderHeader.salesRepNameRaw || "غير محدد",
                    "كود البائع": orderHeader.salesRep?.id || orderHeader.salesRepIdRaw || "",
                    "العميل": orderHeader.customer?.name || "غير محدد",
                    "قطاع العميل": orderHeader.sector || "",
                    "كود الصنف": item.itemCode,
                    "اسم الصنف": item.itemName,
                    "الكمية": item.qty,
                    "الخصم %": item.discount,
                    "تاريخ التسليم": orderHeader.deliveryDate
                }));

                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "OrderData");
                
                worksheet['!cols'] = [
                    { wch: 5 }, { wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 12 },
                    { wch: 25 }, { wch: 20 }, { wch: 25 }, { wch: 35 }, { wch: 10 },
                    { wch: 10 }, { wch: 15 }
                ];

                XLSX.writeFile(workbook, `SalesOrder_${orderHeader.poNumber || 'NoPO'}.xlsx`);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                setTimeout(() => {
                    setIsSubmitting(false);
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 4000);
                }, 1200);
            };

            return (
                <div className="min-h-screen p-4 md:p-6" dir="rtl">
                    <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
                        
                        {/* Header */}
                        <div className="bg-gradient-to-l from-indigo-700 to-indigo-800 p-8 text-white text-center shadow-lg relative overflow-hidden">
                            <div className="relative z-10 flex flex-col items-center gap-2">
                                <h1 className="text-3xl font-black tracking-tight">نظام تسجيل الطلبيات</h1>
                                <p className="text-indigo-200 text-sm font-medium">قطاع التوزيع التجاري</p>
                            </div>
                        </div>

                        <form onSubmit={handleSubmit} className="p-6 md:p-8 space-y-10">
                            
                            {/* Basic Info Section */}
                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-8 relative overflow-hidden group">
                                <h2 className="text-xl font-extrabold text-slate-800 flex items-center gap-2.5">
                                    <div className="p-2 bg-indigo-50 rounded-lg">
                                        <Icon name="Tag" className="w-5 h-5 text-indigo-600" />
                                    </div> 
                                    البيانات الأساسية للطلبية
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    <div className="space-y-1.5">
                                        <label className="flex items-center gap-2 text-slate-700 font-bold text-sm">
                                            <Icon name="Calendar" className="w-4 h-4 text-indigo-500" /> تاريخ الطلب
                                        </label>
                                        <input 
                                            type="date" 
                                            value={orderHeader.date} 
                                            onChange={(e) => setOrderHeader({...orderHeader, date: e.target.value})} 
                                            className="w-full p-2.5 rounded-lg border border-slate-300 bg-slate-50 font-semibold outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 text-sm transition-all" 
                                        />
                                    </div>

                                    <SearchableSelect 
                                        label="اسم البائع" iconName="User" options={salesReps} placeholder="البحث أو الكتابة..." labelKey="name" valueKey="id"
                                        selectedValue={orderHeader.salesRep?.id || ""} 
                                        allowCustom={true}
                                        onCustomChange={(val) => setOrderHeader(prev => ({ ...prev, salesRep: null, salesRepNameRaw: val }))}
                                        onSelect={(rep) => setOrderHeader(prev => ({ ...prev, salesRep: rep, salesRepNameRaw: rep.name, salesRepIdRaw: rep.id }))}
                                    />

                                    <SearchableSelect 
                                        label="كود البائع" iconName="Hash" options={salesReps} placeholder="الكود..." labelKey="id" valueKey="id"
                                        selectedValue={orderHeader.salesRep?.id || ""} 
                                        allowCustom={true}
                                        onCustomChange={(val) => setOrderHeader(prev => ({ ...prev, salesRep: null, salesRepIdRaw: val }))}
                                        onSelect={(rep) => setOrderHeader(prev => ({ ...prev, salesRep: rep, salesRepNameRaw: rep.name, salesRepIdRaw: rep.id }))}
                                    />

                                    <div className="space-y-1.5">
                                        <label className="flex items-center gap-2 text-slate-700 font-bold text-sm">
                                            <Icon name="Package" className="w-4 h-4 text-indigo-500" /> القطاع/المنطقة
                                        </label>
                                        <input 
                                            list="sectors-list"
                                            type="text"
                                            value={orderHeader.sector}
                                            placeholder="اختر أو اكتب القطاع..."
                                            onChange={(e) => setOrderHeader({...orderHeader, sector: e.target.value})}
                                            className="w-full p-2.5 rounded-lg border border-slate-300 focus:border-indigo-500 outline-none text-xs font-bold shadow-sm"
                                        />
                                        <datalist id="sectors-list">
                                            {sectors.map((s, i) => <option key={i} value={s} />)}
                                        </datalist>
                                    </div>

                                    <SearchableSelect 
                                        label="اسم العميل" iconName="Search" options={customers} placeholder="العميل..." labelKey="name" valueKey="code"
                                        selectedValue={orderHeader.customer?.code || ""} onSelect={handleCustomerSelect}
                                    />

                                    <SearchableSelect 
                                        label="كود العميل" iconName="Hash" options={customers} placeholder="كود..." labelKey="code" valueKey="code"
                                        selectedValue={orderHeader.customer?.code || ""} onSelect={handleCustomerSelect}
                                    />

                                    <div className="space-y-1.5">
                                        <label className="flex items-center gap-2 text-slate-700 font-bold text-sm">
                                            <Icon name="Tag" className="w-4 h-4 text-indigo-500" /> رقم الطلبية (PO)
                                        </label>
                                        <input 
                                            type="text" 
                                            required
                                            placeholder="أدخل رقم PO"
                                            value={orderHeader.poNumber} 
                                            onChange={(e) => setOrderHeader({...orderHeader, poNumber: e.target.value})}
                                            className="w-full p-2.5 rounded-lg border border-slate-300 font-mono font-bold text-indigo-700 outline-none focus:border-indigo-500 text-right bg-white" 
                                        />
                                    </div>

                                    <div className="space-y-1.5">
                                        <label className="flex items-center gap-2 text-slate-700 font-bold text-sm">
                                            <Icon name="Calendar" className="w-4 h-4 text-indigo-500" /> تاريخ التسليم
                                        </label>
                                        <input 
                                            type="date" 
                                            required
                                            value={orderHeader.deliveryDate}
                                            onChange={(e) => setOrderHeader({...orderHeader, deliveryDate: e.target.value})}
                                            className="w-full p-2.5 rounded-lg border border-slate-300 focus:border-indigo-500 outline-none text-sm font-semibold"
                                        />
                                    </div>
                                </div>
                            </div>

                            {/* Order Details Table */}
                            <div className="space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 px-2">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2.5">
                                        <div className="p-2 bg-indigo-600 rounded-lg">
                                            <Icon name="ShoppingCart" className="w-5 h-5 text-white" />
                                        </div>
                                        تفاصيل الأصناف
                                    </h2>
                                    
                                    <div className="flex flex-wrap items-center gap-3 w-full md:w-auto">
                                        {/* حقل الخصم العام الجديد */}
                                        <div className="flex items-center gap-2 bg-indigo-50 p-1 pr-3 rounded-xl border border-indigo-100 shadow-inner">
                                            <Icon name="Percent" className="w-4 h-4 text-indigo-600" />
                                            <span className="text-xs font-bold text-indigo-700 whitespace-nowrap">تطبيق خصم عام لكل الأصناف:</span>
                                            <input 
                                                type="number" 
                                                placeholder="0"
                                                value={globalDiscount}
                                                onChange={(e) => applyGlobalDiscount(e.target.value)}
                                                className="w-16 p-2 rounded-lg border border-indigo-200 focus:border-indigo-500 outline-none text-center text-xs font-black text-indigo-800"
                                            />
                                        </div>

                                        <button 
                                            type="button" 
                                            onClick={exportToExcel} 
                                            className="bg-emerald-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 hover:bg-emerald-700 transition-all shadow-lg text-sm font-bold"
                                        >
                                            <Icon name="Download" className="w-4 h-4 stroke-[3px]" /> تصدير Excel
                                        </button>

                                        <button 
                                            type="button" 
                                            onClick={addItemRow} 
                                            className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg text-sm font-bold"
                                        >
                                            <Icon name="Plus" className="w-4 h-4 stroke-[3px]" /> إضافة صنف
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm bg-white">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-right border-collapse">
                                            <thead className="bg-slate-900 text-slate-100 border-b-4 border-indigo-500">
                                                <tr>
                                                    <th className="p-5 text-xs font-black w-1/4">كود الصنف</th>
                                                    <th className="p-5 text-xs font-black w-1/3">اسم الصنف</th>
                                                    <th className="p-5 text-xs font-black w-24 text-center">الكمية</th>
                                                    <th className="p-5 text-xs font-black w-28 text-center">الخصم (%)</th>
                                                    <th className="p-5 text-xs font-black w-16 text-center"></th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {orderItems.map((item) => (
                                                    <tr key={item.id} className="hover:bg-indigo-50/30 transition-all">
                                                        <td className="p-3">
                                                            <SearchableSelect 
                                                                options={products} placeholder="الكود..." labelKey="code" valueKey="code" showLabel={false}
                                                                selectedValue={item.itemCode} onSelect={(prod) => handleProductSelect(item.id, prod)}
                                                            />
                                                        </td>
                                                        <td className="p-3">
                                                            <SearchableSelect 
                                                                options={products} placeholder="اسم الصنف..." labelKey="name" valueKey="code" showLabel={false}
                                                                selectedValue={item.itemCode} onSelect={(prod) => handleProductSelect(item.id, prod)}
                                                            />
                                                        </td>
                                                        <td className="p-3">
                                                            <input type="number" min="1" value={item.qty} onChange={(e) => handleItemUpdate(item.id, 'qty', e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-lg text-center font-black" />
                                                        </td>
                                                        <td className="p-3">
                                                            <input type="number" min="0" value={item.discount} onChange={(e) => handleItemUpdate(item.id, 'discount', e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-lg text-center font-black" />
                                                        </td>
                                                        <td className="p-3 text-center">
                                                            <button type="button" onClick={() => removeItemRow(item.id)} className="text-slate-300 hover:text-red-500 p-2"><Icon name="Trash2" className="w-5 h-5" /></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            {/* Submit Section */}
                            <div className="flex flex-col items-center gap-6 pt-12 border-t border-slate-100">
                                <button 
                                    type="submit" 
                                    disabled={isSubmitting}
                                    className={`w-full md:w-[450px] py-5 rounded-2xl flex items-center justify-center gap-4 text-white font-black text-2xl shadow-xl transition-all ${isSubmitting ? 'bg-slate-400' : 'bg-gradient-to-r from-green-600 to-emerald-500 hover:-translate-y-1'}`}
                                >
                                    {isSubmitting ? "جاري الإرسال..." : "اعتماد الطلبية"}
                                </button>
                                
                                {showSuccess && (
                                    <div className="bg-emerald-50 text-emerald-700 px-10 py-4 rounded-2xl border-2 border-emerald-100 font-black">
                                        تم اعتماد الطلبية بنجاح!
                                    </div>
                                )}
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
